<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Background: dark earthy bag/floor -->
  <rect width="800" height="600" fill="#5c3d1e"/>
  <rect width="800" height="600" fill="url(#bg-texture)" opacity="0.3"/>
  
  <!-- Warm grain pile gradient -->
  <defs>
    <radialGradient id="pile" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#d4a44c"/>
      <stop offset="60%" stop-color="#b8862e"/>
      <stop offset="100%" stop-color="#7a5018"/>
    </radialGradient>
    <radialGradient id="grain" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8c06a"/>
      <stop offset="100%" stop-color="#9a6420"/>
    </radialGradient>
    <radialGradient id="grain2" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c8903a"/>
      <stop offset="100%" stop-color="#7a4a10"/>
    </radialGradient>
    <radialGradient id="grain3" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#a87230"/>
    </radialGradient>
  </defs>
  
  <!-- Large grain pile base -->
  <ellipse cx="400" cy="420" rx="380" ry="180" fill="url(#pile)"/>
  
  <!-- Many individual sorghum grains scattered -->
  <!-- Row 1 -->
  <ellipse cx="120" cy="380" rx="11" ry="16" fill="url(#grain)" transform="rotate(-15,120,380)"/>
  <ellipse cx="165" cy="360" rx="10" ry="15" fill="url(#grain2)" transform="rotate(10,165,360)"/>
  <ellipse cx="210" cy="375" rx="11" ry="16" fill="url(#grain3)" transform="rotate(-5,210,375)"/>
  <ellipse cx="255" cy="355" rx="10" ry="14" fill="url(#grain)" transform="rotate(20,255,355)"/>
  <ellipse cx="300" cy="370" rx="11" ry="16" fill="url(#grain2)" transform="rotate(-10,300,370)"/>
  <ellipse cx="345" cy="350" rx="10" ry="15" fill="url(#grain3)" transform="rotate(5,345,350)"/>
  <ellipse cx="390" cy="365" rx="11" ry="16" fill="url(#grain)" transform="rotate(-20,390,365)"/>
  <ellipse cx="435" cy="348" rx="10" ry="14" fill="url(#grain2)" transform="rotate(15,435,348)"/>
  <ellipse cx="480" cy="360" rx="11" ry="16" fill="url(#grain3)" transform="rotate(-8,480,360)"/>
  <ellipse cx="525" cy="372" rx="10" ry="15" fill="url(#grain)" transform="rotate(12,525,372)"/>
  <ellipse cx="570" cy="355" rx="11" ry="16" fill="url(#grain2)" transform="rotate(-18,570,355)"/>
  <ellipse cx="615" cy="370" rx="10" ry="14" fill="url(#grain3)" transform="rotate(7,615,370)"/>
  <ellipse cx="660" cy="352" rx="11" ry="16" fill="url(#grain)" transform="rotate(-12,660,352)"/>
  <ellipse cx="700" cy="368" rx="10" ry="15" fill="url(#grain2)" transform="rotate(18,700,368)"/>
  
  <!-- Row 2 -->
  <ellipse cx="100" cy="415" rx="11" ry="16" fill="url(#grain3)" transform="rotate(8,100,415)"/>
  <ellipse cx="148" cy="400" rx="10" ry="15" fill="url(#grain)" transform="rotate(-14,148,400)"/>
  <ellipse cx="196" cy="418" rx="11" ry="16" fill="url(#grain2)" transform="rotate(20,196,418)"/>
  <ellipse cx="244" cy="398" rx="10" ry="14" fill="url(#grain3)" transform="rotate(-6,244,398)"/>
  <ellipse cx="292" cy="415" rx="11" ry="16" fill="url(#grain)" transform="rotate(16,292,415)"/>
  <ellipse cx="340" cy="395" rx="10" ry="15" fill="url(#grain2)" transform="rotate(-22,340,395)"/>
  <ellipse cx="388" cy="413" rx="11" ry="16" fill="url(#grain3)" transform="rotate(4,388,413)"/>
  <ellipse cx="436" cy="395" rx="10" ry="14" fill="url(#grain)" transform="rotate(-17,436,395)"/>
  <ellipse cx="484" cy="410" rx="11" ry="16" fill="url(#grain2)" transform="rotate(13,484,410)"/>
  <ellipse cx="532" cy="398" rx="10" ry="15" fill="url(#grain3)" transform="rotate(-9,532,398)"/>
  <ellipse cx="580" cy="415" rx="11" ry="16" fill="url(#grain)" transform="rotate(21,580,415)"/>
  <ellipse cx="628" cy="397" rx="10" ry="14" fill="url(#grain2)" transform="rotate(-5,628,397)"/>
  <ellipse cx="676" cy="413" rx="11" ry="16" fill="url(#grain3)" transform="rotate(11,676,413)"/>
  <ellipse cx="720" cy="400" rx="10" ry="15" fill="url(#grain)" transform="rotate(-19,720,400)"/>

  <!-- Row 3 -->
  <ellipse cx="130" cy="450" rx="11" ry="16" fill="url(#grain2)" transform="rotate(6,130,450)"/>
  <ellipse cx="180" cy="435" rx="10" ry="15" fill="url(#grain3)" transform="rotate(-16,180,435)"/>
  <ellipse cx="230" cy="455" rx="11" ry="16" fill="url(#grain)" transform="rotate(22,230,455)"/>
  <ellipse cx="280" cy="433" rx="10" ry="14" fill="url(#grain2)" transform="rotate(-3,280,433)"/>
  <ellipse cx="330" cy="450" rx="11" ry="16" fill="url(#grain3)" transform="rotate(17,330,450)"/>
  <ellipse cx="380" cy="430" rx="10" ry="15" fill="url(#grain)" transform="rotate(-13,380,430)"/>
  <ellipse cx="430" cy="448" rx="11" ry="16" fill="url(#grain2)" transform="rotate(9,430,448)"/>
  <ellipse cx="480" cy="430" rx="10" ry="14" fill="url(#grain3)" transform="rotate(-20,480,430)"/>
  <ellipse cx="530" cy="448" rx="11" ry="16" fill="url(#grain)" transform="rotate(14,530,448)"/>
  <ellipse cx="580" cy="432" rx="10" ry="15" fill="url(#grain2)" transform="rotate(-7,580,432)"/>
  <ellipse cx="630" cy="450" rx="11" ry="16" fill="url(#grain3)" transform="rotate(19,630,450)"/>
  <ellipse cx="680" cy="435" rx="10" ry="14" fill="url(#grain)" transform="rotate(-11,680,435)"/>

  <!-- Row 4 - near top -->
  <ellipse cx="200" cy="320" rx="10" ry="14" fill="url(#grain3)" transform="rotate(9,200,320)"/>
  <ellipse cx="260" cy="305" rx="11" ry="16" fill="url(#grain)" transform="rotate(-18,260,305)"/>
  <ellipse cx="320" cy="320" rx="10" ry="14" fill="url(#grain2)" transform="rotate(14,320,320)"/>
  <ellipse cx="380" cy="302" rx="11" ry="16" fill="url(#grain3)" transform="rotate(-6,380,302)"/>
  <ellipse cx="440" cy="318" rx="10" ry="14" fill="url(#grain)" transform="rotate(20,440,318)"/>
  <ellipse cx="500" cy="304" rx="11" ry="16" fill="url(#grain2)" transform="rotate(-12,500,304)"/>
  <ellipse cx="560" cy="320" rx="10" ry="14" fill="url(#grain3)" transform="rotate(8,560,320)"/>
  <ellipse cx="620" cy="306" rx="11" ry="16" fill="url(#grain)" transform="rotate(-17,620,306)"/>
  
  <!-- Scattered grain dots for texture/depth -->
  <circle cx="145" cy="335" r="6" fill="#c08828" opacity="0.8"/>
  <circle cx="290" cy="315" r="5" fill="#d4a040" opacity="0.7"/>
  <circle cx="445" cy="328" r="6" fill="#b07020" opacity="0.8"/>
  <circle cx="590" cy="335" r="5" fill="#e0b050" opacity="0.7"/>
  <circle cx="730" cy="320" r="6" fill="#c89030" opacity="0.8"/>
  <circle cx="85" cy="470" r="5" fill="#d0a038" opacity="0.7"/>
  <circle cx="745" cy="455" r="6" fill="#b87828" opacity="0.8"/>
  
  <!-- Label area at bottom -->
  <rect x="0" y="540" width="800" height="60" fill="#3d2008" opacity="0.7"/>
  <text x="400" y="578" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#f0c060" text-anchor="middle" letter-spacing="3">SORGHUM (DAWA)</text>
</svg>
